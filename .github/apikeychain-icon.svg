<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" role="img" aria-label="API Keychain icon">
  <style>
    .icon-light { display: block; }
    .icon-dark  { display: none; }
    @media (prefers-color-scheme: dark) {
      .icon-light { display: none; }
      .icon-dark  { display: block; }
    }
  </style>

  <g class="icon-light">
    <circle cx="50" cy="50" r="49.5" fill="black" stroke="black"/>
    <circle cx="50" cy="200" r="49.5" fill="black" stroke="black"/>
    <circle cx="450" cy="200" r="49.5" fill="black" stroke="black"/>
    <circle cx="50" cy="350" r="49.5" fill="black" stroke="black"/>
    <circle cx="250.5" cy="199.5" r="87" fill="black" stroke="black"/>
    <line x1="50" y1="195" x2="450" y2="195" stroke="black" stroke-width="10"/>
    <line x1="53.5355" y1="46.4645" x2="194.957" y2="187.886" stroke="black" stroke-width="10"/>
    <line x1="46.4645" y1="346.886" x2="187.886" y2="205.464" stroke="black" stroke-width="10"/>
  </g>

  <g class="icon-dark">
    <circle cx="50" cy="50" r="50" fill="white"/>
    <circle cx="50" cy="200" r="50" fill="white"/>
    <circle cx="450" cy="200" r="50" fill="white"/>
    <circle cx="50" cy="350" r="50" fill="white"/>
    <circle cx="250.5" cy="199.5" r="87.5" fill="white"/>
    <line x1="50" y1="195" x2="450" y2="195" stroke="white" stroke-width="10"/>
    <line x1="53.5355" y1="46.4645" x2="194.957" y2="187.886" stroke="white" stroke-width="10"/>
    <line x1="46.4645" y1="346.886" x2="187.886" y2="205.464" stroke="white" stroke-width="10"/>
  </g>
</svg>
