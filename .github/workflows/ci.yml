name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  backend:
    name: Backend smoke test
    runs-on: ubuntu-latest
    env:
      MASTER_SECRET: ci-test-master-secret-not-for-production
      SUPABASE_JWT_SECRET: ci-test-jwt-secret-not-for-production
      DATABASE_URL: sqlite:///:memory:
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile Python sources
        run: python -m compileall -q .

      - name: Import application modules
        run: |
          python -c "import main, router, registry, crypto, models"

      - name: Health check
        run: |
          uvicorn main:app --host 127.0.0.1 --port 8000 &
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/health; then
              exit 0
            fi
            sleep 1
          done
          echo "Gateway did not become healthy in time"
          exit 1
